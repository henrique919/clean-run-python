services:
  - type: web
    name: clean-run-python
    runtime: python
    plan: starter
    buildCommand: python -m compileall app.py
    startCommand: python app.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CLEANRUN_DATA_FILE
        value: /var/data/cleanrun_data.json
    disk:
      name: cleanrun-data
      mountPath: /var/data
      sizeGB: 1
