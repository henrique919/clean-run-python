  function photoHint(){$("#photoHint").textContent=$("#capType").value==='incomplete'?"Recommended":"Required for this item type"}function toggleRaised(){const el=$("#raisedField");if(el)el.hidden=$("#capType").value!=='client'}
  function readFileDataUrl(file){return new Promise((ok,no)=>{const r=new FileReader;r.onload=()=>ok(r.result);r.onerror=no;r.readAsDataURL(file)})}
  function compressImageFile(file){return new Promise((ok,no)=>{const url=URL.createObjectURL(file),img=new Image;img.onload=()=>{try{const max=1600,largest=Math.max(img.naturalWidth||img.width,img.naturalHeight||img.height),scale=Math.min(1,max/largest),w=Math.max(1,Math.round((img.naturalWidth||img.width)*scale)),h=Math.max(1,Math.round((img.naturalHeight||img.height)*scale)),canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;const ctx=canvas.getContext("2d",{alpha:false});ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);let q=.8,data=canvas.toDataURL("image/jpeg",q);while(data.length>9500000&&q>.5){q-=.08;data=canvas.toDataURL("image/jpeg",q)}ok(data)}catch(e){no(e)}finally{URL.revokeObjectURL(url)}};img.onerror=()=>{URL.revokeObjectURL(url);no(new Error("Could not read image."))};img.src=url})}
  async function fileToData(file){if(file.type&&file.type.startsWith("image/")){try{return await compressImageFile(file)}catch(e){console.warn("[CleanRun] image compression failed; using original",e)}}return readFileDataUrl(file)}
  async function filesToData(files){return Promise.all([...files].map(fileToData))}

  async function saveCapture(e){e.preventDefault();const form=e.currentTarget,data=Object.fromEntries(new FormData(form));const mode=e.submitter?.value||"save";data.createdBy=state.settings.preparedBy;data.originalPhotos=capturePhotos;const voice=$("#voiceText").value.trim();if(voice){data.voiceTranscript=voice;data.voiceNote={transcript:voice,createdAt:new Date().toISOString(),status:"parsed"}}if(data.type==="client"&&!data.raisedBy)return toast("A Client Defect requires a Raised By / source.",true);if(mode==="issue"&&(!data.trade||!data.subcontractor))return toast("Issue Now requires a trade and subcontractor.",true);try{const path=mode==="issue"?"/api/items?issue_now=true":"/api/items";const item=await api(path,{method:"POST",body:JSON.stringify(data)});capturePhotos=[];if(walkMode){walkCount++;await reload();route="capture";render();toast(`${item.code} saved - continue walk`)}else{await reload();route="items";render();toast(mode==="issue"?`${item.code} issued`:`${item.code} saved`)}}catch(err){toast(err.message,true)}}
  function itemsView(){const project=state.settings.activeProject;return `<header class="screen-header"><div class="header-row"><div class="screen-title">Items</div><button class="header-pill" id="projectScope" onclick="toggleProjectScope()">⚙ ${esc(project)}</button></div><div class="native-search">⌕<input id="search" placeholder="Search code, location, trade…" oninput="filterItems()"></div></header><div class="filter-stack"><div class="hscroll" id="typeFilters">${[['all','All types'],['defect','Defects'],['incomplete','Incomplete'],['client','Client Defects']].map(([v,l])=>`<button class="filter-chip dark ${v==='all'?'active':''}" data-value="${v}" onclick="setFilter(this,'type')">${l}</button>`).join('')}</div><div class="hscroll" id="statusFilters">${['All','Captured','Issued','Ready','Rejected','Overdue','Closed'].map(v=>`<button class="filter-chip light ${v==='All'?'active':''}" data-value="${v}" onclick="setFilter(this,'status')">${v}</button>`).join('')}</div></div><div class="screen-scroll"><div class="count-label" id="itemCount"></div><div class="list" id="itemList"></div></div>`}

ton><button class="btn alt" onclick="showItem('${i.id}')">OPEN DETAIL</button></div></article>`}).join(''):`<div class="native-card empty"><b>No items ready for review</b><br><span class="meta">Items appear here after rectification evidence is uploaded and marked ready.</span></div>`}</div>`}
  function evidenceRow(e,label){const photo=e.photo&&!e.photo.startsWith("seed://")?`<img src="${e.photo}" alt="${label}">`:`<div class="badge">📷 ${esc(label)}</div>`;return `<div class="evidence">${photo}<div><b>${esc(e.by||label)}</b><div>${esc(e.comment||e.note||e.confirmation||"")}</div><div class="meta">${esc(fmt(e.at))}</div></div></div>`}

  function showItem(id){const i=state.items.find(x=>x.id===id);$("#modalTitle").innerHTML=`${esc(i.code)} · ${esc(typeLabels[i.type])} <button class="btn alt small" style="margin-left:10px" onclick="editItemForm('${i.id}')">✎ Edit</button>`;$("#modalBody").innerHTML=`<div class="sections"><section class="native-card"><div class="spread"><div><span class="badge ${i.status}">${labels[i.status]}</span> ${i.priority==='urgent'?'<span class="badge overdue">Urgent</span>':''}</div></div><h2 style="margin-top:14px">${esc(i.description)}</h2><div class="meta">${esc(loc(i))}<br>${esc(i.trade||"Unassigned")} · ${esc(i.subcontractor||"Unassigned")} · Due ${esc(i.dueDate)}</div>${i.rejectionReason?`<div class="notice red" style="margin-top:10px"><span>⚠</span><span><strong>Rejected</strong><small>${esc(i.rejectionReason)}</small></span></div>`:''}<div class="actions" style="margin-top:14px">${nextButtons(i)}</div></section><section class="native-card"><h2>Original Issue</h2><p>${esc(i.description||'No description')}</p><div class="photo-preview">${(i.originalPhotos||[]).map((p,n)=>p.startsWith('seed://')?`<span class="thumb">${seedThumb(p)}</span>`:`<img src="${p}" alt="Original issue ${n+1}">`).join('')||'<span class="meta">No photos</span>'}</div>${i.voiceTranscript?`<blockquote><b>Created from voice note</b><br>${esc(i.voiceTranscript)}</blockquote>`:''}<p class="meta">Captured by ${esc(i.createdBy||'Site Manager')} · ${esc(fmt(i.createdAt))}</p></section><section class="native-card"><h2>Assignment & Issue History</h2>${(i.issueHistory||[]).map(e=>`<div class="event"><b>${e.reissue?'Re-issued':'Issued'} to ${esc(e.to)}</b><div class="meta">${esc(e.by||'')} · ${esc(fmt(e.at))}</div>${e.note?`<p>${esc(e.note)}</p>`:''}</div>`).join('')||'<div class="meta">Not yet issued to a subcontractor.</div>'}</section><section class="native-card"><h2>Subcontractor Rectification</h2><div class="meta">Evidence uploaded by the trade</div>${(i.rectificationEvidence||[]).map(e=>evidenceRow(e,"   function menuGroup(title,rows){return `<section><div class="menu-group-title">${title}</div><div class="menu">${rows.map(([icon,label,sub,to])=>`<button class="menu-row" onclick="go('${to}')"><span class="menu-icon">${icon}</span><span><b>${label}</b><small>${sub}</small></span><span class="chev">›</span></button>`).join('')}</div></section>`}
  function subHeader(title){return `<header class="back-header"><button onclick="go('more')">‹</button><b>${title}</b></header>`}
  function reportsView(){const project=state.settings.activeProject,items=state.items.filter(i=>i.project===project),reports=[['handover','Closed / Handover Evidence','Full evidence chain: original issue, rectification & closeout sign-off'],['open','Open Items','All items not yet closed'],['overdue','Overdue Items','Items past their due date'],['subcontractor','Subcontractor','Items grouped by responsible trade'],['client','Client Defects','Items raised by the client side'],['incomplete','Incomplete Works','Work not yet finished']];const count=id=>id==='open'?items.filter(i=>!['closed','complete'].includes(i.status)).length:id==='overdue'?items.filter(overdue).length:id==='client'?items.filter(i=>i.type==='client').length:id==='incomplete'?items.filter(i=>i.type==='incomplete').length:items.length;return `${subHeader('Reports & Handover')}<div class="screen-scroll"><div class="native-card" style="text-align:center"><div class="logo-box" style="display:inline-block">CLEANRUN <span style="color:#20C55E">IQ</span></div><div class="meta" style="margin-top:8px">${esc(project)} · prepared by ${esc(state.settings.preparedBy)}</div></div><div class="report-grid">${reports.map(([id,title,desc],n)=>`<article class="native-card report ${n===0?'hero':''}" role="link" tabindex="0" onclick="location.href='/api/reports/${id}'" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();location.href='/api/reports/${id}'}"><div class="item-main"><span class="menu-icon">${n===0?'★':'▤'}</span><span style="flex:1"><h2>${title}</h2><p class="subtle">${desc}</p><b style="font-size:11px;color:${n===0?'#20C55E':'#121619'}">${count(id)} item${count(id)===1?'':'s'}</b></span><span class="chev">›</span></div></article>`).join('')}</div><p class="meta" style="text-align:center">Reports separate original issue, subcontractor rectification and supervisor closeout evidence. Open a report to preview and export as PDF.</p></div>`}
  function settingsView(){const s=state.settings;return `${subHeader('Settings & Admin')}<form class="settings-scroll" onsubmit="saveSettings(event)"><section class="form-card"><h2>Company & branding</h2><div class="field-list"><label>Company name<input name="company" value="${esc(s.company)}"></label><label>Prepared by<input name="preparedBy" value="${esc(s.preparedBy)}"></label></div><p class="meta">Company name is stored for reports. Prepared by follows the signed-in user while auth is enabled.</p><button class="btn" style="margin-top:10px">Save</button></section><section class="form-card"><h2>Projects</h2>${s.projects.map(p=>`<div class="spread" style="padding:10px 0;border-bottom:1px solid var(--line)"><b>${esc(p)}</b>${p===s.activeProject?'<span class="badge complete">Active</span>':''}</div>`).join('')}<div class="actions" style="margin-top:12px"><input id="newProject" placeholder="Add a project…"><button class="btn" type="button" onclick="addProject()">+</button></div></section><section class="form-card"><h2>Subcontractors (${s.subcontractors.length})</h2>${s.subcontractors.map(n=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)"><b>${esc(n)}</b><div class="meta">${esc(s.subProfiles[n]?.trade||'')}</div></div>`).join('')}<div class="actions" style="margin-top:12px"><label class="btn alt">Upload subcontractors<input hidden type="file" accept=".xlsx,.xlsm,.csv,.tsv" onchange="uploadSettingsSheet(this,'subcontractors')"></label><button class="btn alt" type="button" onclick="addSubcontractor()">+ Add subcontractor</button></div></section><section class="form-card"><h2>Demo data</h2><button class="btn danger" type="button" onclick="resetDemo()">↻ Reset to demo data</button></section><div class="meta" style="text-align:center">CleanRun IQ Field App</div></form>`}
  async function addProject(){const el=$("#newProject"),name=el.value.trim();if(!name)return;const s=structuredClone(state.settings);if(s.projects.includes(name))return;s.projects.push(name);s.projectConfigs[name]={name,address:'',buildings:['Block A'],levels:['L01'],units:[],rooms:['Kitchen','Living','Bathroom','Bedroom 1'],defaultDueDays:7};await api('/api/settings',{method:'POST',body:JSON.stringify({projects:s.projects,projectConfigs:s.projectConfigs})});await reload()}
  function setupView(){const s=state.settings,c=s.projectConfigs[s.activeProject];return `${subHeader('Project Setup')}<div class="settings-scroll"><section class="form-card"><h2>Active project</h2><div class="setup-chips">${s.projects.map(p=>`<button class="filter-chip dark ${p===s.activeProject?'active':''}" onclick="event.preventDefault();switchSetupProject('${esc(p)}')">${esc(p)}</button>`).join('')}</div>${c.address?`<p class="meta">${esc(c.address)}</p>`:''}</section>${[['buildings','Buildings'],['levels','Levels'],['units','Units / Areas'],['rooms','Rooms / Locations']].map(([key,title])=>setupList(key,title,c[key]||[])).join('')}<p class="meta" style="text-align:center">These options appear as quick-select fields when capturing items.</p></div>`}
  function setupList(key,title,values){return `<section class="form-card"><h2>${title}</h2><div class="setup-chips">${values.length?values.map(v=>`<span class="setup-chip">${esc(v)} <button class="close" style="font-size:15px" onclick="removeSetup(event,'${key}','${esc(v)}')">×</button></span>`).join(''):'<span class="meta">None yet</span>'}</div><div class="actions" style="margin-top:12px"><input id="setup-${key}" placeholder="Add ${title.toLowerCase()}…"><button class="btn" onclick="addSetup(event,'${key}')">+</button></div></section>`}
  async function saveConfig(cfg){const s=structuredClone(state.settings);s.projectConfigs[s.activeProject]=cfg;await api('/api/settings',{method:'POST',body:JSON.stringify({projectConfigs:s.projectConfigs})});await reload();route='setup';render()}
  async function switchSetupProject(name){await api('/api/settings',{method:'POST',body:JSON.stringify({activeProject:name})});await reload();route='setup';render()}
  async function addSetup(e,key){e.preventDefault();const el=$(`#setup-${key}`),v=el.value.trim();if(!v)return;const cfg=structuredClone(state.settings.projectConfigs[state.settings.activeProject]);if(!cfg[key].includes(v))cfg[key].push(v);await saveConfig(cfg)}
  async function removeSetup(e,key,v){e.preventDefault();const cfg=structuredClone(state.settings.projectConfigs[state.settings.activeProject]);cfg[key]=cfg[key].filter(x=>x!==v);await saveConfig(cfg)}
  function subcontractorView(){const names=state.settings.subcontractors,selected=window.selectedSub&&names.includes(window.selectedSub)?window.selectedSub:names[0];window.selectedSub=selected;const items=state.items.filter(i=>i.subcontractor===selected&&!['closed','complete'].includes(i.status));return `${subHeader('Subcontractor Mode')}<header class="screen-header" style="padding-top:12px"><div class="meta" style="color:#ffffffaa;text-transform:uppercase">Subcontractor view</div><select onchange="window.selectedSub=this.value;render()" style="margin-top:7px">${options(names,selected)}</select></header><div class="notice" style="margin:14px;background:#fef3c7;color:#92400e">⛑ This view shows only work assigned to the selected subcontractor.</div><div class="screen-scroll">${items.length?items.map(i=>`<article class="native-card"><div class="item-code-row"><b>${esc(i.code)}</b><span class="badge ${i.status}">${labels[i.status]}</span></div><div class="item-location">${esc(loc(i))}</div><p>${esc(i.description)}</p>${i.rejectionReason?`<div class="notice red"><span>⚠</span><span><strong>Rejected — re-work needed</strong><small>${esc(i.rejectionReason)}</small></span></div>`:''}<div class="meta">${(i.rectificationEvidence||[]).length} evidence upload${(i.rectificationEvidence||[]).length===1?'':'s'} · Due ${esc(i.dueDate)}</div><button class="btn" style="margin-top:12px;width:100%" onclick="subEvidence('${i.id}')">▧ Upload evidence</button></article>`).join(''):'<div class="native-card empty"><b>No open items</b><br>Nothing is currently assigned to this subcontractor.</div>'}</div>`}
  async function subEvidence(id){const comment=prompt('Rectification comment:',''),photo=await chooseImage();if(!photo&&!comment)return toast('Attach a photo or add a comment before submitting.',true);const advance=confirm('Mark this item ready for review?');try{await api(`/api/items/${id}/actions/rectification`,{method:'POST',body:JSON.stringify({photo,comment,by:window.selectedSub,advanceToReady:advance})});await reload();route='subcontractor';render();toast(advance?'Evidence submitted · ready for review':'Progress saved')}catch(e){toast(e.message,true)}}
  async function saveSettings(e){e.preventDefault();const data=Object.fromEntries(new FormData(e.currentTarget));try{await api('/api/settings',{method:'POST',body:JSON.stringify(data)});await reload();toast('Settings saved')}catch(err){toast(err.message,true)}}
  async function uploadSettingsSheet(input,target){const file=input.files?.[0];if(!file)return;const body=new FormData;body.append('target',target);body.append('project',state.settings.activeProject);body.append('file',file);try{const res=await api('/api/settings/import',{method:'POST',body});await reload();route='settings';render();toast(`${res.imported||0} ${target} imported`)}catch(err){toast(err.message,true)}finally{input.value=''}}
  async function addSubcontractor(){const name=prompt('Subcontractor name:','');if(!name)return;const trade=prompt('Trade:',trades[0])||'';const s=structuredClone(state.settings);if(!s.subcontractors.includes(name))s.subcontractors.push(name);s.subcontractors.sort();s.subProfiles[name]={name,trade};try{await api('/api/settings',{method:'POST',body:JSON.stringify({subcontractors:s.subcontractors,subProfiles:s.subProfiles})});await reload();route='settings';render();toast('Subcontractor added')}catch(err){toast(err.message,true)}}
  async function resetDemo(){if(!confirm('Replace current data with the original demo data?'))return;await api('/api/reset',{method:'POST',body:'{}'});await reload();toast('Demo data restored')}
  function isPdfPlan(plan){return !!plan&&(plan.fileType==='application/pdf'||String(plan.image||'').startsWith('data:application/pdf')||/\.pdf$/i.test(plan.fileName||''))}
  const basePlansView=plansView;
  plansView=function(){return basePlansView().replace('accept="image/*" onchange="addPlan(this)"','accept="image/*,application/pdf,.pdf" onchange="addPlan(this)"')};
  const baseWirePlan=wirePlan;
  wirePlan=function(){const input=document.querySelector('input[onchange="addPlan(this)"]');if(input)input.accept='image/*,application/pdf,.pdf';const active=state.plans.filter(p=>p.project===state.settings.activeProject)[0],canvas=$("#planCanvas");if(canvas&&isPdfPlan(active)){canvas.style.backgroundImage='none';canvas.classList.add('pdf');const pdf=document.createElement('object');pdf.className='plan-pdf';pdf.type='application/pdf';pdf.data=active.image;pdf.setAttribute('aria-label',active.fileName||active.name||'PDF plan');canvas.prepend(pdf);const title=canvas.closest('section')?.querySelector('h2');if(title){const badge=document.createElement('span');badge.className='badge plan-type';badge.textContent='PDF';title.append(badge)}}baseWirePlan()};
  addPlan=async function(input){const file=input.files?.[0];if(!file)return;const isPdf=file.type==='application/pdf'||/\.pdf$/i.test(file.name),isImage=file.type.startsWith('image/');if(!isPdf&&!isImage){input.value='';return toast('Choose a PDF or image plan file.',true)}const image=(await filesToData([file]))[0],suggested=file.name.replace(/\.[^.]+$/,'')||'New level plan',name=prompt('Plan name:',suggested)||suggested,cfg=state.settings.projectConfigs[state.settings.activeProject]||{};try{await api('/api/plans',{method:'POST',body:JSON.stringify({name,image,fileName:file.name,fileType:isPdf?'application/pdf':file.type,project:state.settings.activeProject,building:cfg.buildings?.[0]||'',level:cfg.levels?.[0]||''})});await reload();toast(isPdf?'PDF plan added':'Plan added')}catch(e){toast(e.message,true)}finally{input.value=''}};
  async function boot(){try{await reload()}catch(e){if(e.authRequired)return;$("#nav").innerHTML="";$("#app").innerHTML=`<div class="card"><h1>Could not load CleanRun IQ</h1><p>${esc(e.message)}</p><p>Start the Python backend with <code>python app.py</code>.</p></div>`}}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});boot();
  </script>
  <script src="/assets/enhancements.js?v=cards23"></script>
</body>
