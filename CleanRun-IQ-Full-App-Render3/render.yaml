services:
  - type: web
    name: clean-run-python
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -m compileall app.py
    startCommand: python app.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CLEANRUN_DATA_FILE
        value: /var/data/cleanrun_data.json
      - key: CLEANRUN_STORAGE
        value: supabase
      - key: CLEANRUN_STORAGE_BUCKET
        value: cleanrun-evidence
      - key: CLEANRUN_MAX_IMAGE_BYTES
        value: 8000000
      - key: CLEANRUN_MAX_FILE_BYTES
        value: 50000000
      - key: CLEANRUN_MAX_REQUEST_BYTES
        value: 50000000
      - key: CLEANRUN_STATE_BACKEND
        value: local
      - key: CLEANRUN_STATE_TABLE
        value: cleanrun_state
      - key: CLEANRUN_STATE_ID
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    disk:
      name: cleanrun-data
      mountPath: /var/data
      sizeGB: 1
