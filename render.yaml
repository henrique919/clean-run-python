services:
  - type: web
    name: cleanrun-iq-python
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: CLEANRUN_ENV
        value: production
      - key: CLEANRUN_STORAGE
        value: supabase
      - key: CLEANRUN_REQUIRE_SUPABASE
        value: "true"
      - key: CLEANRUN_STORAGE_BUCKET
        value: cleanrun-evidence
      - key: CLEANRUN_MAX_IMAGE_BYTES
        value: "8000000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CLEANRUN_ENABLE_DEMO_RESET
        value: "false"
      - key: CLEANRUN_LAUNCH_ADMIN_EMAILS
        value: "info@cleanruniq.com,harrysfuel@outlook.com"
      - key: CLEANRUN_LOGIN_REQUIRED
        value: "true"
      - key: CLEANRUN_OPEN_ACCESS_EMAIL
        sync: false
      - key: CLEANRUN_OPEN_ACCESS_PASSWORD
        sync: false
      - key: ALLOW_LOCAL_STORAGE_IN_PRODUCTION
        value: "false"
